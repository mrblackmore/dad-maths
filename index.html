<!DOCTYPE html>
<html>
<head>
  <title>Dad Maths</title>
  <style>
    body {
      font-family: Comic Sans MS;
      text-align: center;
      padding: 40px;
      background: #f5f5f5;
    }

    h1 {
      color: #2c3e50;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 15px;
      max-width: 400px;
      margin: auto;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    input {
      font-size: 20px;
      padding: 10px;
      width: 80%;
      margin-top: 10px;
    }

    button {
      font-size: 18px;
      padding: 10px 20px;
      margin-top: 10px;
      border: none;
      background: #3498db;
      color: white;
      border-radius: 10px;
    }

    #feedback {
      margin-top: 15px;
      font-size: 18px;
    }
  </style>
</head>

<body>

  <h1>Dad Maths</h1>

  <div class="card">
    <h2 id="level">🟤 Bronze</h2>

    <p id="question">45 + 23</p>

    <input id="answer" placeholder="Your answer" />
    <br>

    <button onclick="check()">Check</button>

    <p id="feedback"></p>
  </div>

  <script>
    const correctAnswer = 68;

    function check() {
      const input = document.getElementById("answer").value;

      if (parseInt(input) === correctAnswer) {
        document.getElementById("feedback").innerText = "✅ Nice one Lauren!";
      } else {
        document.getElementById("feedback").innerText = "❌ Try again 👀";
      }
    }
  </script>

</body>
</html>
